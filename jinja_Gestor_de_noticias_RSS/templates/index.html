<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noticias RSS</title>
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">
</head>
<body>
<div class="container">
<h1>Últimas Noticias</h1>
{% for item in noticias %}
<h3>{{ item.title }}</h3>
<p>{{ item.summary }}</p>
<a href="{{ item.link }}">Leer más</a>
<hr>
{% endfor %}
</div>
</body>
</html>
