{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="text-center mb-4">
            <div class="display-6 text-primary mb-2">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h2 class="fw-bold">Nuevo Registro</h2>
            <p class="text-muted">Ingresa los datos para dar de alta a una nueva persona</p>
        </div>

        <div class="p-2">
            <form action="/save" method="post">
                
                <div class="mb-4">
                    <label class="form-label fw-semibold text-secondary">
                        <i class="bi bi-person me-1"></i> Nombre Completo
                    </label>
                    <input type="text" 
                           class="form-control form-control-lg" 
                           name="nombre" 
                           placeholder="Ingresa nombre" 
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold text-secondary">
                        <i class="bi bi-telephone me-1"></i> Teléfono de contacto
                    </label>
                    <input type="text" 
                           class="form-control form-control-lg" 
                           name="telefono" 
                           placeholder="Ej. 61130119" 
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold text-secondary">
                        <i class="bi bi-calendar-check me-1"></i> Fecha de Nacimiento
                    </label>
                    <input type="date" 
                           class="form-control form-control-lg" 
                           name="fecha_nacimiento" 
                           required>
                    <div class="form-text">Selecciona la fecha en el calendario</div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                    <a href="/" class="btn btn-light border px-4">
                        <i class="bi bi-arrow-left me-1"></i> Volver
                    </a>
                    <button type="submit" class="btn btn-primary px-5 shadow-sm">
                        <i class="bi bi-check-lg me-1"></i> Guardar Registro
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
